services:
  postgres:
    image: postgres:16-alpine
    container_name: job-hunter-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: job_hunter_agent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d job_hunter_agent"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api-runner
    container_name: job-hunter-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      API_PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/job_hunter_agent?schema=public
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      FIRECRAWL_API_KEY: ${FIRECRAWL_API_KEY:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      LINKEDIN_EMAIL: ${LINKEDIN_EMAIL:-}
      LINKEDIN_PASSWORD: ${LINKEDIN_PASSWORD:-}
    ports:
      - "4000:4000"

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
      target: dashboard-runner
    container_name: job-hunter-dashboard
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
    ports:
      - "3000:3000"

volumes:
  postgres-data:
